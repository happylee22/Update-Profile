<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Selection Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="demo-card">
        <p class="eyebrow">Topic 1</p>
        <h1>DOM Selection and Content Update</h1>
        <p class="intro">
          Using this page to teach how to select elements and change text,
          images, and styles with JavaScript.
        </p>

        <div class="playground">
          <div class="controls">
            <label for="studentInput">Student Name</label>
            <input type="text" id="studentInput" placeholder="Type a name" />

            <label for="colorInput">Favorite Color</label>
            <input type="text" id="colorInput" placeholder="Type a color" />

            <label for="imageInput">Avatar Image URL</label>
            <input
              type="text"
              id="imageInput"
              placeholder="Paste an image URL to update the avatar"
            />

            <div class="button-row">
              <button id="updateNameBtn" type="button">Update Name</button>
              <button id="changeColorBtn" type="button">
                Change Theme Color
              </button>
              <button id="changeImageBtn" type="button">Change Avatar</button>
            </div>
          </div>

          <div class="preview-card" id="previewCard">
            <img
              id="studentAvatar"
              src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='60' fill='%23d7e7f7'/%3E%3Ccircle cx='60' cy='46' r='22' fill='%231c6bb1'/%3E%3Cpath d='M28 96c7-17 22-26 32-26s25 9 32 26' fill='%231c6bb1'/%3E%3C/svg%3E"
              alt="Default student avatar"
            />
            <h2 id="studentName">Student Name Here</h2>
            <p id="studentMessage">Welcome to the school portal.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
